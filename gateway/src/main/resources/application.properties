server.port=8080

# Backend to forward requests to
gateway.backend-url=http://localhost:9090

# Rate limiter defaults
gateway.rate-limit.algorithm=TOKEN_BUCKET
gateway.rate-limit.limit=100
gateway.rate-limit.window-seconds=60

# Cache defaults
gateway.cache.ttl-seconds=30
gateway.cache.max-size=500

# CORS for dashboard
spring.mvc.cors.allowed-origins=http://localhost:5173
